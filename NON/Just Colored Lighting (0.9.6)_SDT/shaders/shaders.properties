#//prevent sampling darker corners of blocks
	separateAo=true

iris.features.optional = FADE_VARIABLE

#if FLOODFILL_LIGHTING > 0
	#//enable custom images. we are using a 3d custom image to store our voxel data
	iris.features.required = CUSTOM_IMAGES

	#//make the shadow pass run for voxelizing, even if we don't sample it. Iris and Optifine will otherwise not run the shadow pass unless we sample it
	shadow.enabled=true

	
	#//don't cull offscreen things in the voxelizing range. this range is set in a composite shader, because that's where iris wants it.
	shadow.culling=reversed


	#//create our 3d image, 
	#//   here's the format:
	#//   image. < name for layout > = <name as sampler> <format stuff>                 <clear every frame> <size is relative to screen size> <size x,y,z>
	#//   image.cimage1              =       cSampler1   RED_INTEGER R32UI UNSIGNED_INT true false 128 128 128

	#// #define VOXEL_AREA 128 //[32 48 64 96 128 160 192 224 256 512]
	#if VOXEL_AREA == 1024
		image.cimage1 = cSampler1 RED_INTEGER R32UI UNSIGNED_INT true false 1024 1024 1024
		#if FLOODFILL_LIGHTING >= 1

			image.cimage3_colored_light = cSampler3_colored_light RGBA RGBA8 BYTE false false 1024 2048 1024
		#endif
	#endif
	#if VOXEL_AREA == 512
		image.cimage1 = cSampler1 RED_INTEGER R32UI UNSIGNED_INT true false 512 512 512
		#if FLOODFILL_LIGHTING >= 1

			image.cimage3_colored_light = cSampler3_colored_light RGBA RGBA8 BYTE false false 512 1024 512
		#endif
	#endif
	#if VOXEL_AREA == 256
		image.cimage1 = cSampler1 RED_INTEGER R32UI UNSIGNED_INT true false 256 256 256
		#if FLOODFILL_LIGHTING >= 1

			image.cimage3_colored_light = cSampler3_colored_light RGBA RGBA8 BYTE false false 256 512 256
		#endif
	#endif
	#if VOXEL_AREA == 224
		image.cimage1 = cSampler1 RED_INTEGER R32UI UNSIGNED_INT true false 224 224 224
		#if FLOODFILL_LIGHTING >= 1

			image.cimage3_colored_light = cSampler3_colored_light RGBA RGBA8 BYTE false false 224 448 224
		#endif
	#endif
	#if VOXEL_AREA == 192
		image.cimage1 = cSampler1 RED_INTEGER R32UI UNSIGNED_INT true false 192 192 192
		#if FLOODFILL_LIGHTING >= 1

			image.cimage3_colored_light = cSampler3_colored_light RGBA RGBA8 BYTE false false 192 384 192
		#endif
	#endif
	#if VOXEL_AREA == 160
		image.cimage1 = cSampler1 RED_INTEGER R32UI UNSIGNED_INT true false 160 160 160
		#if FLOODFILL_LIGHTING >= 1

			image.cimage3_colored_light = cSampler3_colored_light RGBA RGBA8 BYTE false false 160 320 160
		#endif
	#endif

	#if VOXEL_AREA == 128
		image.cimage1 = cSampler1 RED_INTEGER R32UI UNSIGNED_INT true false 128 128 128
		#if FLOODFILL_LIGHTING >= 1

			image.cimage3_colored_light = cSampler3_colored_light RGBA RGBA8 BYTE false false 128 256 128
		#endif
	#endif
	
	#if VOXEL_AREA == 96
		image.cimage1 = cSampler1 RED_INTEGER R32UI UNSIGNED_INT true false 96 96 96
		#if FLOODFILL_LIGHTING >= 1

			image.cimage3_colored_light = cSampler3_colored_light RGBA RGBA8 BYTE false false 96 192 96
		#endif
	#endif
	#if VOXEL_AREA == 64
		image.cimage1 = cSampler1 RED_INTEGER R32UI UNSIGNED_INT true false 64 64 64
		#if FLOODFILL_LIGHTING >= 1
			
			image.cimage3_colored_light = cSampler3_colored_light RGBA RGBA8 BYTE false false 64 128 64
		#endif
	#endif
	#if VOXEL_AREA == 48
		image.cimage1 = cSampler1 RED_INTEGER R32UI UNSIGNED_INT true false 48 48 48
		#if FLOODFILL_LIGHTING >= 1

			image.cimage3_colored_light = cSampler3_colored_light RGBA RGBA8 BYTE false false 48 96 48
		#endif
	#endif
	#if VOXEL_AREA == 32
		image.cimage1 = cSampler1 RED_INTEGER R32UI UNSIGNED_INT true false 32 32 32
		#if FLOODFILL_LIGHTING >= 1

			image.cimage3_colored_light = cSampler3_colored_light RGBA RGBA8 BYTE false false 32 64 32
		#endif
	#endif
	
	#if SOLAR_GI >= 3
		image.cimage4_gi = cSampler4_gi RGBA RGBA8 BYTE false false 128 256 768
	#endif

#endif




