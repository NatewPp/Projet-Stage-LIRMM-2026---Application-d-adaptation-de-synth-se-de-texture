	screen.END_SKY= END_PLANET_CYCLE <empty> END_MANUAL_PLANET_CYCLE END_MANUAL_PLANET_ANGLE <empty> ACCRETIONDISC_DETAIL_ALONG_LONGTITUDE ACCRETIONDISC_DOPPLER_EFFECT


