	taaJitterIndex == 11,  -0.39269, \
	taaJitterIndex == 12,  -0.88294, \
	taaJitterIndex == 13,   0.62682, \
	taaJitterIndex == 14,   0.13657, \
	taaJitterIndex == 15,  -0.35367, \
0.0)) / viewWidth, \
(if( \
