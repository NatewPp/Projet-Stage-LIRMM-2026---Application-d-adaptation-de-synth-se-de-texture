variable.float.frameTimeFactor = 0.003183099 / if(frameTime == 0, 5, frameTime)
variable.float.angleRx = asin(gbufferModelView.1.1 * gbufferPreviousModelView.1.2 - gbufferModelView.1.2 * gbufferPreviousModelView.1.1) * frameTimeFactor
uniform.float.eyeRxSmooth = smooth(11, angleRx, 0.7, 0.7)
variable.float.angleRy = asin(gbufferModelView.0.2 * gbufferPreviousModelView.0.0 - gbufferModelView.0.0 * gbufferPreviousModelView.0.2) * frameTimeFactor
uniform.float.eyeRySmooth = smooth(12, angleRy, 0.7, 0.7)

uniform.float.isSneakingSmooth = smooth(13, if(is_sneaking, 1.0, 0.0), 1.0, 0.5)

variable.int.taaJitterIndex = frameCounter % 16
uniform.vec2.taaJitter = vec2((if( \
	taaJitterIndex ==  0,  -1.00000, \
