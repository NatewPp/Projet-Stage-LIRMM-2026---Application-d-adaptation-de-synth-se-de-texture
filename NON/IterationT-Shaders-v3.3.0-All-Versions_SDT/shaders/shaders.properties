screen=<profile>        TITLE \
       <empty>          <empty> \
       [LIGHTING]       iterationT_VERSION \
       [SURFACE]        iterationT_VERSION_TYPE \
       [VOL]            <empty> \
       [POSTPROCESSING] iterationT_INFO \
       <empty>          <empty> \
       [MOD_SUPPORT]    [SHORTCUT]



screen.LIGHTING=[LIGHT_SOURCE] [HELDLIGHT] [SHADOW] [GI] [AO]

	screen.LIGHT_SOURCE=sunPathRotation    TORCHLIGHT_BRIGHTNESS \
						SUNLIGHT_INTENSITY TORCHLIGHT_COLOR_TEMPERATURE \
						SKYLIGHT_INTENSITY <empty> \
						<empty>            DIRECTIONAL_BLOCKLIGHT \
						NOLIGHT_BRIGHTNESS DIRECTIONAL_BLOCKLIGHT_STRENGTH \
						NETHER_BRIGHTNESS  <empty> \
						NIGHT_BRIGHTNESS   <empty> \
						COLD_MOONLIGHT


	screen.HELDLIGHT =  HELDLIGHT_MODE     HELDLIGHT_BRIGHTNESS \
						[FLASHLIGHT]       HELDLIGHT_FALLOFF \
						<empty>            FLASHLIGHT_HELDLIGHT_FALLOFF \
						SPECULAR_HELDLIGHT <empty> \
						HELDLIGHT_SHADOW

		screen.FLASHLIGHT = FLASHLIGHT_FOV                FLASHLIGHT_POS_L_X \
							<empty>                       FLASHLIGHT_POS_L_Y \
							FLASHLIGHT_CAMERA_SMOOTH      FLASHLIGHT_POS_R_X \
							FLASHLIGHT_CAMERA_SMOOTH_TIME FLASHLIGHT_POS_R_Y \
							<empty>                       <empty> \
							FLASHLIGHT_COLOR_R            <empty> \
							FLASHLIGHT_COLOR_G            <empty> \
							FLASHLIGHT_COLOR_B

	screen.SHADOW = shadowMapResolution  VARIABLE_PENUMBRA_SHADOWS \
					shadowDistance       VPS_QUALITY \
					SHADOW_MAP_BIAS      VPS_SPREAD \
					SHADOW_BASIC_BLUR    <empty> \
					<empty>              COLORED_SHADOWS \
					SCREEN_SPACE_SHADOWS CAUSTICS \
					<empty>              <empty> \
					SUNLIGHT_LEAK_FIX

	screen.GI = GI_RSM GI_RENDER_RESOLUTION <empty> GI_QUALITY GI_RADIUS GI_BRIGHTNESS GI_FALLOFF <empty> GI_SKYLIGHT_FALLOFF

	screen.AO = GTAO               GTAO_QUALITY \
				<empty>            GTAO_SLICE_QUALITY \
				GTAO_RADIUS_MODE   <empty> \
				GTAO_WORLD_RADIUS  GTAO_FALLOFF_START \
				GTAO_MAX_RADIUS    GTAO_STRENGTH \
				GTAO_SCREEN_RADIUS GTAO_MULTIBOUNCE


screen.SURFACE= [POM]         TEXTURE_RESOLUTION \
				[PBR]         ENTITIES_TEXTURE_RESOLUTION \
				[WATER_RAIN]  <empty> \
				[SKY_TEXTURE] ANISOTROPIC_FILTERING_QUALITY \
				[END_SKY]     ANISOTROPIC_FILTERING_NORMAL_SPECULAR \
				[SURFMISC]

	screen.POM= PARALLAX_MODE           ENTITIES_PARALLAX \
				PARALLAX_DEPTH          ENTITIES_TEXTURE_RESOLUTION \
				PARALLAX_QUALITY        <empty> \
				<empty>                 PARALLAX_BASED_NORMAL \
				PARALLAX_SHADOW         <empty> \
				PARALLAX_SHADOW_QUALITY PARALLAX_FADE

	screen.PBR= ENABLE_PBR TEXTURE_PBR_FORMAT <empty> [REFLECTION] [SSS] [EMISSIVE] [POROSITY]
		
